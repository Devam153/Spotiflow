<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotiflow - Step 2</title>
    <meta name="description" content="Choose your playlist" />
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --background: 0 0% 9%;
            --foreground: 0 0% 100%;
            --primary: 142 70% 50%;
            --primary-foreground: 0 0% 9%;
            --muted: 240 3.7% 15.9%;
            --muted-foreground: 240 5% 84.9%;
            --radius: 0.5rem;
        }

        body {
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
        }

        .step-circle {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 4rem;
            width: 4rem;
            border-radius: 9999px;
            background-color: black;
            border: 2px solid hsl(var(--primary));
            color: hsl(var(--primary));
            font-size: 1.875rem;
            font-weight: 700;
        }

        .primary-button {
            background-color: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            border-radius: 0.5rem;
            padding: 0.75rem 2rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(57, 211, 83, 0.5);
            text-decoration: none;
            display: inline-block;
        }

        .primary-button:hover {
            box-shadow: 0 0 25px rgba(57, 211, 83, 0.7);
            transform: translateY(-2px);
        }

        .input-field {
            background-color: hsl(var(--muted));
            border: 1px solid hsla(var(--muted-foreground), 0.2);
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            color: hsl(var(--foreground));
            width: 100%;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .input-field:focus {
            outline: none;
            box-shadow: 0 0 0 2px hsla(var(--primary), 0.5);
        }
    </style>
</head>

<body>
    <div id="root"></div>
    {% load static %}
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-router-dom@6/umd/react-router-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script type="text/babel" src="{% static 'js/main.js' %}"></script>
    {% csrf_token %}
</body>

</html>
