<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotiflow - Completion</title>
    <meta name="description" content="Your playlist is ready!" />
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --background: 0 0% 9%;
            --foreground: 0 0% 100%;
            --primary: 142 70% 50%;
            --primary-foreground: 0 0% 9%;
            --muted: 240 3.7% 15.9%;
            --muted-foreground: 240 5% 84.9%;
            --radius: 0.5rem;
        }

        body {
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
        }

        .primary-button {
            background-color: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            border-radius: 0.5rem;
            padding: 0.75rem 2rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(57, 211, 83, 0.5);
            text-decoration: none;
            display: inline-block;
        }

        .primary-button:hover {
            box-shadow: 0 0 25px rgba(57, 211, 83, 0.7);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }

            to {
                transform: scale(1);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        .animate-scale-in {
            animation: scaleIn 0.5s 0.3s ease-out forwards;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    {% load static %}
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-router-dom@6/umd/react-router-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script type="text/babel" src="{% static 'js/main.js' %}"></script>
    {% csrf_token %}
</body>

</html>
